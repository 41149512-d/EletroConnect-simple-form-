<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitar Serviço - EletroConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--primary:#FFFFFF;--secondary:#FFC107;--secondary-dark:#e6ac00;--dark:#121212;--gray:#f5f5f5;--gray-mid:#e0e0e0;--text-muted:#666;--radius:12px;--shadow:0 4px 16px rgba(0,0,0,.09);}
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif;}
    body{background:#f9f9f9;color:var(--dark);}a{text-decoration:none;color:inherit;}
    header{background:white;box-shadow:0 2px 10px rgba(0,0,0,.08);}
    .navbar{max-width:980px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;padding:16px 24px;}
    .logo{font-size:22px;font-weight:700;} .logo span{color:var(--secondary);} .btn{padding:12px 18px;border:none;border-radius:10px;cursor:pointer;font-weight:600;}
    .btn-primary{background:var(--secondary);color:#000;}
    main{max-width:980px;margin:0 auto;padding:40px 24px;}
    .card{background:white;border-radius:16px;box-shadow:var(--shadow);padding:32px;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    input,select,textarea{width:100%;padding:12px 14px;border:1px solid var(--gray-mid);border-radius:10px;margin-top:6px;font-size:14px;}
    input.invalid,select.invalid,textarea.invalid{border-color:#c62828;}
    label{display:block;font-size:14px;font-weight:600;margin-bottom:6px;}
    textarea{min-height:120px;resize:vertical;}
    .error-text{display:none;color:#c62828;font-size:12px;margin-top:6px;}
    .btn{width:100%;display:flex;justify-content:center;align-items:center;gap:8px;}
    @media (max-width: 760px){.grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<header>
  <div class="navbar">
    <a href="index.html" class="logo">⚡ Eletro<span>Connect</span></a>
    <a href="dashboard-cliente.html" style="font-size:14px;color:var(--text-muted);">Voltar ao painel</a>
  </div>
</header>
<main>
  <div class="card">
    <h2 style="margin-bottom:8px;">Solicitar serviço</h2>
    <p style="color:var(--text-muted);margin-bottom:24px;">Preencha os detalhes para receber orçamentos.</p>
    <form id="serviceForm">
      <div class="grid">
        <div>
          <label for="categoria">Categoria</label>
          <select id="categoria">
            <option>Instalações</option>
            <option>Iluminação</option>
            <option>Emergências</option>
            <option>Disjuntores</option>
            <option>Tomadas</option>
            <option>Fiação</option>
          </select>
        </div>
        <div>
          <label for="data">Data preferida</label>
          <input type="date" id="data" required>
          <div class="error-text" id="dataError"></div>
        </div>
      </div>
      <div class="grid" style="margin-top:16px;">
        <div>
          <label for="endereco">Endereço</label>
          <input type="text" id="endereco" placeholder="Rua, número, bairro" required>
          <div class="error-text" id="enderecoError"></div>
        </div>
        <div>
          <label for="telefone">Telefone</label>
          <input type="tel" id="telefone" placeholder="(11) 99999-9999" required>
          <div class="error-text" id="telefoneError"></div>
        </div>
      </div>
      <div style="margin-top:16px;">
        <label for="descricao">Descrição do problema</label>
        <textarea id="descricao" placeholder="Descreva o que está acontecendo..." required></textarea>
        <div class="error-text" id="descricaoError"></div>
      </div>
      <div style="margin-top:16px;">
        <label for="pricingMode">Opção de preço</label>
        <select id="pricingMode">
          <option value="fixed">Preço fixo</option>
          <option value="discussed">Valor a ser discutido</option>
        </select>
      </div>
      <div id="priceBlock" style="margin-top:16px;">
        <label for="valorProjeto">Valor do projeto (R$)</label>
        <input type="number" id="valorProjeto" min="0" step="0.01" placeholder="Ex.: 350">
        <div class="error-text" id="valorProjetoError"></div>
      </div>
      <button type="submit" class="btn btn-primary" style="display:block;margin-top:18px;">Enviar solicitação</button>
    </form>
  </div>
</main>
<script>
function setError(input, errorEl, message) {
  if (message) {
    input.classList.add('invalid');
    errorEl.textContent = message;
    errorEl.style.display = 'block';
  } else {
    input.classList.remove('invalid');
    errorEl.textContent = '';
    errorEl.style.display = 'none';
  }
}

const form = document.getElementById('serviceForm');
const pricingMode = document.getElementById('pricingMode');
const priceBlock = document.getElementById('priceBlock');
const valorProjeto = document.getElementById('valorProjeto');

function togglePriceBlock() {
  const isFixed = pricingMode.value === 'fixed';
  priceBlock.style.display = isFixed ? 'block' : 'none';
  if (!isFixed) {
    valorProjeto.value = '';
    setError(valorProjeto, document.getElementById('valorProjetoError'), '');
  }
}

pricingMode.addEventListener('change', togglePriceBlock);
togglePriceBlock();

form.addEventListener('submit', function (e) {
  e.preventDefault();
  const data = document.getElementById('data');
  const endereco = document.getElementById('endereco');
  const telefone = document.getElementById('telefone');
  const descricao = document.getElementById('descricao');
  let valid = true;

  if (!data.value) {
    setError(data, document.getElementById('dataError'), 'Selecione uma data.');
    valid = false;
  } else {
    setError(data, document.getElementById('dataError'), '');
  }
  if (!endereco.value.trim()) {
    setError(endereco, document.getElementById('enderecoError'), 'Informe o endereço.');
    valid = false;
  } else {
    setError(endereco, document.getElementById('enderecoError'), '');
  }
  if (!/^\(?\d{2}\)?\s?9?\d{4}-?\d{4}$/.test(telefone.value.trim())) {
    setError(telefone, document.getElementById('telefoneError'), 'Telefone inválido.');
    valid = false;
  } else {
    setError(telefone, document.getElementById('telefoneError'), '');
  }
  if (!descricao.value.trim() || descricao.value.trim().length < 10) {
    setError(descricao, document.getElementById('descricaoError'), 'Descreva o problema com pelo menos 10 caracteres.');
    valid = false;
  } else {
    setError(descricao, document.getElementById('descricaoError'), '');
  }
  if (pricingMode.value === 'fixed') {
    if (!valorProjeto.value || Number(valorProjeto.value) <= 0) {
      setError(valorProjeto, document.getElementById('valorProjetoError'), 'Informe um valor válido para o projeto.');
      valid = false;
    } else {
      setError(valorProjeto, document.getElementById('valorProjetoError'), '');
    }
  }

  if (!valid) return;

  const request = {
    id: Date.now(),
    service: document.getElementById('categoria').value,
    date: data.value,
    address: endereco.value.trim(),
    phone: telefone.value.trim(),
    description: descricao.value.trim(),
    pricingMode: pricingMode.value,
    projectValue: pricingMode.value === 'fixed' ? Number(valorProjeto.value) : null,
    distance: 1.8 + Math.random() * 4,
    status: 'Pendente'
  };

  const saved = JSON.parse(localStorage.getItem('eletroconnectRequests') || '[]');
  saved.unshift(request);
  localStorage.setItem('eletroconnectRequests', JSON.stringify(saved));

  alert('Solicitação enviada com sucesso! Você será redirecionado para a agenda.');
  window.location.href = 'agenda.html';
});
</script>
</body>
</html>
